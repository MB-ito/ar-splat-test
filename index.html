<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Model Viewer / AR</title>
  <style>
    :root {
      color-scheme: dark;
      --panel-bg: rgba(0, 0, 0, 0.58);
      --panel-border: rgba(255, 255, 255, 0.18);
      --text-main: #ffffff;
      --text-sub: rgba(255, 255, 255, 0.9);
      --text-error: #ffb4b4;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      position: fixed;
      inset: 0;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #hud,
    #tapHint,
    #actions {
      position: fixed;
      left: 12px;
      right: 12px;
      z-index: 20;
      color: var(--text-main);
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(10px);
      box-sizing: border-box;
    }

    #hud {
      top: 12px;
      border-radius: 14px;
      padding: 12px 14px;
      line-height: 1.5;
      pointer-events: none;
    }

    #status {
      font-weight: 700;
      margin-bottom: 6px;
    }

    #detail,
    #supportNote,
    #error {
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #detail,
    #supportNote {
      color: var(--text-sub);
    }

    #error {
      color: var(--text-error);
      margin-top: 6px;
    }

    #tapHint {
      left: 50%;
      bottom: 96px;
      transform: translateX(-50%);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      pointer-events: none;
      display: none;
      white-space: nowrap;
    }

    #actions {
      bottom: 16px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      align-items: center;
      padding: 10px;
      border-radius: 18px;
    }

    .action-link,
    #ar-entry button,
    #ar-entry a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      background: rgba(20, 20, 20, 0.75);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
      box-sizing: border-box;
    }

    .action-link[hidden],
    #supportNote[hidden] {
      display: none;
    }

    #quicklook-link img {
      width: 1px;
      height: 1px;
      opacity: 0;
      position: absolute;
      pointer-events: none;
    }

    @media (max-width: 640px) {
      #actions {
        flex-wrap: wrap;
        justify-content: stretch;
      }

      .action-link,
      #ar-entry button,
      #ar-entry a {
        flex: 1 1 auto;
      }

      #tapHint {
        max-width: calc(100vw - 24px);
        white-space: normal;
        text-align: center;
      }
    }
  </style>

  <script async src="https://unpkg.com/es-module-shims@1.10.0/dist/es-module-shims.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/",
      "@mkkellogg/gaussian-splats-3d": "https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/+esm"
    }
  }
  </script>
</head>
<body>
  <div id="app"></div>

  <div id="hud">
    <div id="status">初期化中...</div>
    <div id="detail">表示ファイルを確認中です。</div>
    <div id="supportNote" hidden></div>
    <div id="error"></div>
  </div>

  <div id="tapHint">床や机を映して平面検知し、1本指タップで配置します</div>

  <div id="actions">
    <div id="ar-entry"></div>
    <a id="quicklook-link" class="action-link" href="./ARtest.usdz" rel="ar" hidden>
      iPhoneでAR表示
      <img
        alt=""
        aria-hidden="true"
        src="data:image/gif;base64,R0lGODlhAQABAAAAACwAAAAAAQABAAA="
      />
    </a>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { ARButton } from 'three/addons/webxr/ARButton.js';
    import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
    import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { USDZLoader } from 'three/addons/loaders/USDZLoader.js';
    import * as GaussianSplats3D from '@mkkellogg/gaussian-splats-3d';

    const BASE_NAME = './ARtest';
    const DEFAULT_PLACEMENT_SCALE = 0.35;
    const BASE_YAW_OFFSET = Math.PI;

    const app = document.getElementById('app');
    const statusEl = document.getElementById('status');
    const detailEl = document.getElementById('detail');
    const supportNoteEl = document.getElementById('supportNote');
    const errorEl = document.getElementById('error');
    const tapHintEl = document.getElementById('tapHint');
    const arEntryEl = document.getElementById('ar-entry');
    const quickLookLinkEl = document.getElementById('quicklook-link');

    const ua = navigator.userAgent;
    const isAppleMobile =
      /iPhone|iPad|iPod/i.test(ua) ||
      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    const assetCandidates = [
      { type: 'ply', path: `${BASE_NAME}.ply`, label: '3DGS PLY' },
      { type: 'usdz', path: `${BASE_NAME}.usdz`, label: 'USDZ' },
      { type: 'fbx', path: `${BASE_NAME}.fbx`, label: 'FBX' },
      { type: 'obj', path: `${BASE_NAME}.obj`, label: 'OBJ' }
    ];

    let activeAsset = null;
    let modelLoaded = false;
    let modelPlaced = false;
    let canUseWebXRAR = false;
    let lastPlacementTs = 0;
    let activeViewer = null;

    function setStatus(message) {
      statusEl.textContent = message;
      console.log('[status]', message);
    }

    function setDetail(message) {
      detailEl.textContent = message;
      console.log('[detail]', message);
    }

    function setSupportNote(message = '') {
      supportNoteEl.hidden = !message;
      supportNoteEl.textContent = message;
    }

    function setError(error) {
      const message = typeof error === 'string' ? error : (error?.stack || error?.message || String(error));
      errorEl.textContent = message;
      console.error(error);
    }

    function clearError() {
      errorEl.textContent = '';
    }

    async function probeFile(url) {
      try {
        const headResponse = await fetch(url, { method: 'HEAD', cache: 'no-store' });
        if (headResponse.ok) return true;
        if (![403, 405, 501].includes(headResponse.status)) return false;
      } catch (error) {
        console.warn('HEAD probe failed:', url, error);
      }

      try {
        const response = await fetch(url, {
          method: 'GET',
          cache: 'no-store',
          headers: { Range: 'bytes=0-0' }
        });
        const ok = response.ok || response.status === 206;
        if (response.body && typeof response.body.cancel === 'function') {
          void response.body.cancel();
        }
        return ok;
      } catch (error) {
        console.warn('GET probe failed:', url, error);
        return false;
      }
    }

    async function detectImmersiveArSupport() {
      if (!navigator.xr || typeof navigator.xr.isSessionSupported !== 'function') {
        return false;
      }

      try {
        return await navigator.xr.isSessionSupported('immersive-ar');
      } catch (error) {
        console.warn('immersive-ar support check failed', error);
        return false;
      }
    }

    function chooseAsset(availableAssets) {
      const assetsByType = new Map(availableAssets.map((asset) => [asset.type, asset]));

      if (isAppleMobile && assetsByType.has('usdz')) {
        return assetsByType.get('usdz');
      }

      if (assetsByType.has('ply')) return assetsByType.get('ply');
      if (assetsByType.has('usdz')) return assetsByType.get('usdz');
      if (assetsByType.has('fbx')) return assetsByType.get('fbx');
      if (assetsByType.has('obj')) return assetsByType.get('obj');
      return null;
    }

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: true,
      powerPreference: 'high-performance'
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.xr.enabled = true;
    renderer.xr.setReferenceSpaceType('local');
    app.appendChild(renderer.domElement);

    renderer.domElement.addEventListener('webglcontextlost', (event) => {
      event.preventDefault();
      setStatus('描画コンテキストが失われました');
      setDetail('端末負荷が高い可能性があります。ページを再読み込みしてください。');
    });

    renderer.domElement.addEventListener('webglcontextrestored', () => {
      setStatus(modelLoaded ? '描画を復旧しました' : '復旧しました');
      setDetail(modelLoaded ? '必要なら AR を再開してください。' : 'ページを再読み込みしてください。');
    });

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x101014);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.position.set(0, 0.8, 3.2);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0.6, 0);
    controls.minDistance = 0.2;
    controls.maxDistance = 30;
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));

    const dir = new THREE.DirectionalLight(0xffffff, 1.0);
    dir.position.set(3, 4, 2);
    scene.add(dir);

    const grid = new THREE.GridHelper(4, 20, 0x888888, 0x444444);
    scene.add(grid);

    const axes = new THREE.AxesHelper(0.8);
    scene.add(axes);

    const cube = new THREE.Mesh(
      new THREE.BoxGeometry(0.25, 0.25, 0.25),
      new THREE.MeshStandardMaterial({ color: 0xff4444 })
    );
    cube.position.set(0, 0.125, 0);
    scene.add(cube);

    const previewRoot = new THREE.Group();
    scene.add(previewRoot);

    const modelAnchor = new THREE.Group();
    modelAnchor.visible = false;
    scene.add(modelAnchor);

    const splatRoot = new THREE.Group();
    modelAnchor.add(splatRoot);

    const splatViewer = new GaussianSplats3D.DropInViewer({
      selfDrivenMode: false,
      useBuiltInControls: false,
      gpuAcceleratedSort: false,
      sharedMemoryForWorkers: false,
      enableSIMDInSort: false,
      integerBasedSort: false,
      ignoreDevicePixelRatio: true,
      sceneRevealMode: GaussianSplats3D.SceneRevealMode.Instant,
      renderMode: GaussianSplats3D.RenderMode.Always,
      dynamicScene: false,
      antialiased: false,
      logLevel: GaussianSplats3D.LogLevel.Info,
      sphericalHarmonicsDegree: 0
    });

    function frameObject(object3D) {
      const box = new THREE.Box3().setFromObject(object3D);
      if (box.isEmpty()) return;

      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);

      object3D.position.sub(center);

      const maxSize = Math.max(size.x, size.y, size.z, 0.001);
      const distance = maxSize * 1.8;

      camera.near = Math.max(distance / 100, 0.01);
      camera.far = Math.max(distance * 20, 100);
      camera.position.set(maxSize * 0.6, maxSize * 0.4, distance);
      camera.updateProjectionMatrix();

      controls.target.set(0, 0, 0);
      controls.update();
    }

    function resetModelToPreview() {
      modelPlaced = false;
      modelAnchor.visible = true;
      modelAnchor.position.set(0, 0, 0);
      modelAnchor.rotation.set(0, BASE_YAW_OFFSET, 0);
      modelAnchor.scale.setScalar(1.0);
      camera.position.set(0, 0.8, 3.2);
      controls.target.set(0, 0.6, 0);
      controls.update();
    }

    function getPlacementYawFacingCamera(targetPos) {
      const xrCam = renderer.xr.isPresenting ? renderer.xr.getCamera(camera) : camera;
      const camPos = new THREE.Vector3();
      xrCam.getWorldPosition(camPos);

      const dx = camPos.x - targetPos.x;
      const dz = camPos.z - targetPos.z;
      return Math.atan2(dx, dz) + BASE_YAW_OFFSET;
    }

    async function loadPlyAsset(asset) {
      splatRoot.clear();
      splatRoot.add(splatViewer);
      activeViewer = splatViewer;

      setStatus('3DGS 読み込み中');
      setDetail(`${asset.path} を読み込み中です。`);

      await splatViewer.addSplatScenes([
        {
          path: asset.path,
          format: GaussianSplats3D.SceneFormat.Ply,
          splatAlphaRemovalThreshold: 1,
          position: [0, 0, 0],
          rotation: [1, 0, 0, 0],
          scale: [1, 1, 1]
        }
      ]);

      modelLoaded = true;
      resetModelToPreview();
      setStatus('3DGS 読み込み完了');
      setDetail('通常表示で確認できます。Android の WebXR 対応ブラウザでは AR を開始できます。');
    }

    async function loadUsdzAsset(asset) {
      const loader = new USDZLoader();
      setStatus('USDZ 読み込み中');
      setDetail(`${asset.path} を読み込み中です。`);

      const arrayBuffer = await fetch(asset.path, { cache: 'no-store' }).then(async (response) => {
        if (!response.ok) {
          throw new Error(`USDZ fetch failed: HTTP ${response.status}`);
        }
        return response.arrayBuffer();
      });

      const loaded = loader.parse(arrayBuffer);
      previewRoot.add(loaded);
      frameObject(loaded);

      modelLoaded = true;
      setStatus('USDZ 読み込み完了');
      setDetail('通常ビューで確認できます。ドラッグで回転、ピンチまたはホイールでズームできます。');
    }

    async function loadFbxAsset(asset) {
      const loader = new FBXLoader();
      setStatus('FBX 読み込み中');
      setDetail(`${asset.path} を読み込み中です。`);

      const loaded = await loader.loadAsync(asset.path);
      previewRoot.add(loaded);
      frameObject(loaded);

      modelLoaded = true;
      setStatus('FBX 読み込み完了');
      setDetail('通常ビューで確認できます。ドラッグで回転、ピンチまたはホイールでズームできます。');
    }

    async function loadObjAsset(asset) {
      const objLoader = new OBJLoader();
      const mtlPath = `${BASE_NAME}.mtl`;

      if (await probeFile(mtlPath)) {
        const mtlLoader = new MTLLoader();
        const materials = await mtlLoader.loadAsync(mtlPath);
        materials.preload();
        objLoader.setMaterials(materials);
      }

      setStatus('OBJ 読み込み中');
      setDetail(`${asset.path} を読み込み中です。`);

      const loaded = await objLoader.loadAsync(asset.path);
      previewRoot.add(loaded);
      frameObject(loaded);

      modelLoaded = true;
      setStatus('OBJ 読み込み完了');
      setDetail('通常ビューで確認できます。ドラッグで回転、ピンチまたはホイールでズームできます。');
    }

    async function loadActiveAsset() {
      clearError();

      switch (activeAsset.type) {
        case 'ply':
          return loadPlyAsset(activeAsset);
        case 'usdz':
          return loadUsdzAsset(activeAsset);
        case 'fbx':
          return loadFbxAsset(activeAsset);
        case 'obj':
          return loadObjAsset(activeAsset);
        default:
          throw new Error(`未対応の形式です: ${activeAsset.type}`);
      }
    }

    let xrSession = null;
    let xrRefSpace = null;
    let viewerRefSpace = null;
    let hitTestSource = null;
    let hitTestSourceRequested = false;
    let hitTestInitPromise = null;

    const hitPosition = new THREE.Vector3();

    const reticle = new THREE.Mesh(
      new THREE.RingGeometry(0.08, 0.11, 32).rotateX(-Math.PI / 2),
      new THREE.MeshBasicMaterial({ color: 0x00ff88 })
    );
    reticle.matrixAutoUpdate = false;
    reticle.visible = false;
    scene.add(reticle);

    const floorPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const screenRaycaster = new THREE.Raycaster();

    function resetHitTest() {
      if (hitTestSource) {
        hitTestSource.cancel();
        hitTestSource = null;
      }
      hitTestSourceRequested = false;
      hitTestInitPromise = null;
      xrRefSpace = null;
      viewerRefSpace = null;
      reticle.visible = false;
    }

    async function ensureHitTestSource() {
      if (!xrSession || hitTestSource) return;
      if (hitTestInitPromise) return hitTestInitPromise;
      if (hitTestSourceRequested) return;

      hitTestSourceRequested = true;
      hitTestInitPromise = (async () => {
        try {
          viewerRefSpace = await xrSession.requestReferenceSpace('viewer');
          xrRefSpace = await xrSession.requestReferenceSpace('local');
          hitTestSource = await xrSession.requestHitTestSource({ space: viewerRefSpace });
        } catch (error) {
          setError(error);
          setDetail('hit-test の初期化に失敗しました。ブラウザまたは端末の AR 対応状況を確認してください。');
        } finally {
          hitTestInitPromise = null;
        }
      })();

      return hitTestInitPromise;
    }

    const activePointers = new Map();
    const gestureState = {
      active: false,
      mode: 'none',
      startDistance: 0,
      startScale: 1,
      startYaw: 0,
      startPointerX: 0,
      startPos: new THREE.Vector3(),
      startHitPoint: new THREE.Vector3(),
      currentGroundY: 0
    };

    function getTwoPointers() {
      const pointers = [...activePointers.values()];
      if (pointers.length < 2) return null;
      return [pointers[0], pointers[1]];
    }

    function pointerDistance(a, b) {
      return Math.hypot(b.x - a.x, b.y - a.y);
    }

    function pointerAngle(a, b) {
      return Math.atan2(b.y - a.y, b.x - a.x);
    }

    function pointerMid(a, b) {
      return {
        x: (a.x + b.x) * 0.5,
        y: (a.y + b.y) * 0.5
      };
    }

    function screenToNDC(x, y) {
      return new THREE.Vector2(
        (x / window.innerWidth) * 2 - 1,
        -(y / window.innerHeight) * 2 + 1
      );
    }

    function intersectGroundFromScreen(ndc, groundY, outVec3) {
      const xrCam = renderer.xr.isPresenting ? renderer.xr.getCamera(camera) : camera;
      screenRaycaster.setFromCamera(ndc, xrCam);
      floorPlane.constant = -groundY;
      return screenRaycaster.ray.intersectPlane(floorPlane, outVec3);
    }

    function beginTwoPointerGesture() {
      if (!renderer.xr.isPresenting || !modelPlaced || activeAsset?.type !== 'ply') return;

      const pair = getTwoPointers();
      if (!pair) {
        gestureState.active = false;
        gestureState.mode = 'none';
        return;
      }

      const [p1, p2] = pair;
      const mid = pointerMid(p1, p2);
      const midNdc = screenToNDC(mid.x, mid.y);

      gestureState.active = true;
      gestureState.mode = 'two-pointer';
      gestureState.startDistance = pointerDistance(p1, p2);
      gestureState.startScale = modelAnchor.scale.x;
      gestureState.startPos.copy(modelAnchor.position);
      gestureState.currentGroundY = modelAnchor.position.y;

      const hit = intersectGroundFromScreen(midNdc, gestureState.currentGroundY, gestureState.startHitPoint);
      if (!hit) {
        gestureState.startHitPoint.copy(modelAnchor.position);
      }
    }

    function beginSinglePointerGesture(pointer) {
      if (!renderer.xr.isPresenting || !modelPlaced || activeAsset?.type !== 'ply') return;

      gestureState.active = true;
      gestureState.mode = 'single-pointer';
      gestureState.startPointerX = pointer.x;
      gestureState.startYaw = modelAnchor.rotation.y;
    }

    function updateTwoPointerGesture() {
      if (!gestureState.active || gestureState.mode !== 'two-pointer' || !renderer.xr.isPresenting || !modelPlaced || activeAsset?.type !== 'ply') return;

      const pair = getTwoPointers();
      if (!pair) return;

      const [p1, p2] = pair;

      const currentDistance = pointerDistance(p1, p2);
      const scaleFactor = currentDistance / Math.max(gestureState.startDistance, 1);
      const newScale = THREE.MathUtils.clamp(gestureState.startScale * scaleFactor, 0.05, 10.0);
      modelAnchor.scale.setScalar(newScale);

      const mid = pointerMid(p1, p2);
      const midNdc = screenToNDC(mid.x, mid.y);
      const currentHit = new THREE.Vector3();
      const hit = intersectGroundFromScreen(midNdc, gestureState.currentGroundY, currentHit);

      if (hit) {
        const delta = new THREE.Vector3().subVectors(currentHit, gestureState.startHitPoint);
        modelAnchor.position.copy(gestureState.startPos).add(delta);
        modelAnchor.position.y = gestureState.currentGroundY;
      }
    }

    function updateSinglePointerGesture(pointer) {
      if (!gestureState.active || gestureState.mode !== 'single-pointer' || !renderer.xr.isPresenting || !modelPlaced || activeAsset?.type !== 'ply') return;

      const deltaX = pointer.x - gestureState.startPointerX;
      modelAnchor.rotation.y = gestureState.startYaw + (deltaX / Math.max(window.innerWidth, 1)) * Math.PI * 1.5;
    }

    function endPointer(pointerId) {
      activePointers.delete(pointerId);
      if (activePointers.size < 2) {
        gestureState.active = false;
        gestureState.mode = 'none';
      }
    }

    renderer.domElement.addEventListener('pointerdown', (event) => {
      if (!renderer.xr.isPresenting) return;
      activePointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
      if (activePointers.size === 1) {
        beginSinglePointerGesture({ x: event.clientX, y: event.clientY });
      } else if (activePointers.size === 2) {
        beginTwoPointerGesture();
      }
    }, { passive: true });

    renderer.domElement.addEventListener('pointermove', (event) => {
      if (!renderer.xr.isPresenting) return;
      if (activePointers.has(event.pointerId)) {
        activePointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
      }
      if (activePointers.size >= 2) {
        updateTwoPointerGesture();
      } else if (activePointers.size === 1) {
        updateSinglePointerGesture({ x: event.clientX, y: event.clientY });
      }
    }, { passive: true });

    renderer.domElement.addEventListener('pointerup', (event) => {
      endPointer(event.pointerId);
    }, { passive: true });

    renderer.domElement.addEventListener('pointercancel', (event) => {
      endPointer(event.pointerId);
    }, { passive: true });

    renderer.domElement.addEventListener('pointerleave', (event) => {
      endPointer(event.pointerId);
    }, { passive: true });

    function placeModelAtReticle() {
      if (activeAsset?.type !== 'ply') return;
      if (!renderer.xr.isPresenting || !modelLoaded || !reticle.visible) return;
      if (activePointers.size > 1) return;

      const now = performance.now();
      if (now - lastPlacementTs < 250) return;
      lastPlacementTs = now;

      reticle.matrix.decompose(hitPosition, new THREE.Quaternion(), new THREE.Vector3());

      modelAnchor.visible = true;
      modelPlaced = true;
      modelAnchor.position.copy(hitPosition);
      modelAnchor.rotation.set(0, getPlacementYawFacingCamera(hitPosition), 0);

      if (modelAnchor.scale.x === 1.0) {
        modelAnchor.scale.setScalar(DEFAULT_PLACEMENT_SCALE);
      }

      setStatus('AR 配置済み');
      setDetail('1本指ドラッグで回転\n2本指ドラッグで平面移動\n2本指ピンチで拡大縮小\n1本指タップで再配置できます');
    }

    renderer.domElement.addEventListener('click', placeModelAtReticle, { passive: true });

    function buildWebXRButton() {
      const button = ARButton.createButton(renderer, {
        requiredFeatures: ['hit-test'],
        optionalFeatures: ['dom-overlay'],
        domOverlay: { root: document.body }
      });

      Object.assign(button.style, {
        position: 'static',
        width: 'auto',
        height: '48px',
        padding: '0 16px',
        borderRadius: '999px',
        border: '1px solid rgba(255,255,255,.24)',
        background: 'rgba(20,20,20,.75)',
        color: '#fff',
        fontWeight: '700',
        fontSize: '14px'
      });

      arEntryEl.replaceChildren(button);
    }

    renderer.xr.addEventListener('sessionstart', () => {
      if (activeAsset?.type !== 'ply') return;

      xrSession = renderer.xr.getSession();
      controls.enabled = false;
      scene.background = null;
      grid.visible = false;
      axes.visible = false;
      cube.visible = false;
      reticle.visible = false;
      tapHintEl.style.display = 'block';
      activePointers.clear();
      gestureState.active = false;
      gestureState.mode = 'none';
      lastPlacementTs = 0;

      setStatus('AR 起動中');
      setDetail('床や机を映して平面検知してください。検出後に 1 本指タップで配置できます。\n配置後は 1 本指ドラッグで回転、2 本指ドラッグで移動、2 本指ピンチで拡大縮小できます。');
      clearError();

      modelPlaced = false;
      modelAnchor.visible = false;

      xrSession.addEventListener('end', () => {
        xrSession = null;
        resetHitTest();
      }, { once: true });
    });

    renderer.xr.addEventListener('sessionend', () => {
      if (activeAsset?.type !== 'ply') return;

      controls.enabled = true;
      scene.background = new THREE.Color(0x101014);
      grid.visible = true;
      axes.visible = true;
      cube.visible = true;
      tapHintEl.style.display = 'none';
      activePointers.clear();
      gestureState.active = false;
      gestureState.mode = 'none';
      resetModelToPreview();

      setStatus(modelLoaded ? '3DGS 読み込み済み' : '待機中');
      setDetail(modelLoaded ? '通常表示に戻りました。再度 AR を開始できます。' : '3DGS を読み込み中です。');
    });

    function configureUiForAsset(asset, availableAssets) {
      quickLookLinkEl.hidden = true;
      arEntryEl.replaceChildren();

      const multipleAssets = availableAssets.length > 1;
      const availableLabels = availableAssets.map((entry) => entry.label).join(', ');

      if (multipleAssets) {
        setSupportNote(`複数の表示ファイルを検出しました: ${availableLabels}\nこの端末では ${asset.label} を優先して表示します。`);
      }

      if (asset.type === 'ply') {
        if (isAppleMobile) {
          setSupportNote('iPhone / iPad では PLY の 3DGS を通常表示できますが、AR 表示はできません。iOS で AR を使う場合は ARtest.usdz を置いてください。');
        } else if (canUseWebXRAR) {
          buildWebXRButton();
          if (!multipleAssets) {
            setSupportNote('Android の WebXR 対応ブラウザでは下のボタンから AR を開始できます。');
          }
        } else if (!multipleAssets) {
          setSupportNote('このブラウザでは immersive-ar が利用できません。通常表示のみ利用できます。');
        }
        return;
      }

      if (asset.type === 'usdz') {
        if (isAppleMobile) {
          quickLookLinkEl.hidden = false;
          if (!multipleAssets) {
            setSupportNote('iPhone / iPad では下の「iPhoneでAR表示」から Quick Look AR を開きます。');
          }
        } else if (!multipleAssets) {
          setSupportNote('USDZ を通常ビューで表示します。iPhone / iPad Safari では Quick Look から AR 表示できます。');
        }
        return;
      }

      if (!multipleAssets) {
        setSupportNote(`${asset.label} を通常ビューで表示します。AR 表示はこの形式では無効です。`);
      }
    }

    async function initialize() {
      setStatus('表示ファイルを確認中');
      setDetail('ARtest.ply / ARtest.usdz / ARtest.fbx / ARtest.obj を確認しています。');

      const [availableFlags, immersiveArSupported] = await Promise.all([
        Promise.all(assetCandidates.map((asset) => probeFile(asset.path))),
        detectImmersiveArSupport()
      ]);

      canUseWebXRAR = immersiveArSupported;

      const availableAssets = assetCandidates.filter((asset, index) => availableFlags[index]);
      activeAsset = chooseAsset(availableAssets);

      if (!activeAsset) {
        throw new Error('表示できるファイルが見つかりません。ARtest.ply / ARtest.usdz / ARtest.fbx / ARtest.obj のいずれかを配置してください。');
      }

      configureUiForAsset(activeAsset, availableAssets);
      await loadActiveAsset();
    }

    initialize().catch((error) => {
      setStatus('初期化失敗');
      setDetail('表示ファイルの読み込みに失敗しました。');
      setError(error);
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    renderer.setAnimationLoop((time, frame) => {
      if (!renderer.xr.isPresenting) {
        cube.rotation.y += 0.01;
        controls.update();
      } else if (activeAsset?.type === 'ply' && canUseWebXRAR) {
        void ensureHitTestSource();

        if (frame && hitTestSource && xrRefSpace) {
          const hitTestResults = frame.getHitTestResults(hitTestSource);

          if (hitTestResults.length > 0) {
            const hit = hitTestResults[0];
            const pose = hit.getPose(xrRefSpace);

            if (pose) {
              reticle.visible = true;
              reticle.matrix.fromArray(pose.transform.matrix);
            }
          } else {
            reticle.visible = false;
          }
        }
      }

      if (activeViewer && typeof activeViewer.update === 'function') {
        activeViewer.update();
      }

      renderer.render(scene, camera);
    });
  </script>
</body>
</html>
