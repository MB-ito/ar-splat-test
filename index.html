<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>3DGS AR Test Diagnostic</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #app {
      position: fixed;
      inset: 0;
    }
    #hud {
      position: fixed;
      left: 12px;
      right: 12px;
      top: 12px;
      z-index: 10;
      color: #fff;
      background: rgba(0,0,0,.55);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 14px;
      padding: 12px 14px;
      backdrop-filter: blur(8px);
      line-height: 1.5;
      font-size: 14px;
      pointer-events: none;
      box-sizing: border-box;
    }
    #status {
      font-weight: 700;
      margin-bottom: 6px;
    }
    #detail, #error {
      font-size: 12px;
      opacity: .95;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #error {
      color: #ffb4b4;
      margin-top: 6px;
    }
  </style>

  <script async src="https://unpkg.com/es-module-shims@1.10.0/dist/es-module-shims.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/",
      "@mkkellogg/gaussian-splats-3d": "https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/+esm"
    }
  }
  </script>
</head>
<body>
  <div id="app"></div>
  <div id="hud">
    <div id="status">初期化中...</div>
    <div id="detail">通常表示の診断をしています。</div>
    <div id="error"></div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import * as GaussianSplats3D from '@mkkellogg/gaussian-splats-3d';

    const app = document.getElementById('app');
    const statusEl = document.getElementById('status');
    const detailEl = document.getElementById('detail');
    const errorEl = document.getElementById('error');

    function setStatus(s) {
      statusEl.textContent = s;
      console.log('[status]', s);
    }

    function setDetail(s) {
      detailEl.textContent = s;
      console.log('[detail]', s);
    }

    function setError(e) {
      const msg = typeof e === 'string' ? e : (e?.stack || e?.message || String(e));
      errorEl.textContent = msg;
      console.error(e);
    }

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    app.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x101014);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.01,
      100
    );
    camera.position.set(0, 1.2, 3.0);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0.6, 0);
    controls.update();

    const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
    scene.add(hemi);

    const dir = new THREE.DirectionalLight(0xffffff, 1.0);
    dir.position.set(3, 4, 2);
    scene.add(dir);

    const grid = new THREE.GridHelper(4, 20, 0x888888, 0x444444);
    scene.add(grid);

    const axes = new THREE.AxesHelper(0.8);
    scene.add(axes);

    const cube = new THREE.Mesh(
      new THREE.BoxGeometry(0.25, 0.25, 0.25),
      new THREE.MeshStandardMaterial({ color: 0xff4444 })
    );
    cube.position.set(0, 0.125, 0);
    scene.add(cube);

    const splatRoot = new THREE.Group();
    splatRoot.position.set(0, 0, 0);
    splatRoot.scale.setScalar(1.0);
    scene.add(splatRoot);

    const viewer = new GaussianSplats3D.DropInViewer({
      selfDrivenMode: false,
      useBuiltInControls: false,
      gpuAcceleratedSort: false,
      sharedMemoryForWorkers: false,
      enableSIMDInSort: false,
      integerBasedSort: false,
      ignoreDevicePixelRatio: true,
      sceneRevealMode: GaussianSplats3D.SceneRevealMode.Instant,
      renderMode: GaussianSplats3D.RenderMode.Always,
      dynamicScene: false,
      antialiased: false,
      logLevel: GaussianSplats3D.LogLevel.Info,
      sphericalHarmonicsDegree: 0
    });
    splatRoot.add(viewer);

    async function testFetch() {
      setDetail('ARtest.ply の存在確認中...');
      const r = await fetch('./ARtest.ply', { method: 'HEAD' });
      if (!r.ok) throw new Error('ARtest.ply fetch failed: HTTP ' + r.status);
      setDetail('ARtest.ply は取得可能です。3DGS を読み込みます...');
    }

    async function loadSplat() {
      await testFetch();

      const start = performance.now();

      await viewer.addSplatScenes([
        {
          path: './ARtest.ply',
          format: GaussianSplats3D.SceneFormat.Ply,
          splatAlphaRemovalThreshold: 1,
          position: [0, 0, 0],
          rotation: [0, 1, 0, 0],
          scale: [1, 1, 1]
        }
      ]);

      const sec = ((performance.now() - start) / 1000).toFixed(1);
      setStatus('3DGS 読み込み完了');
      setDetail('読込時間: ' + sec + ' 秒\n赤い立方体と一緒に 3DGS が見えるか確認してください。');
    }

    const timeoutId = setTimeout(() => {
      setStatus('3DGS 読み込み待機中');
      setDetail('赤い立方体やグリッドが見えていれば、Three.js は動作しています。\n3DGS の読み込みだけが止まっている可能性があります。');
    }, 8000);

    loadSplat()
      .catch((err) => {
        setStatus('3DGS 読み込み失敗');
        setError(err);
      })
      .finally(() => {
        clearTimeout(timeoutId);
      });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    renderer.setAnimationLoop(() => {
      cube.rotation.y += 0.01;
      if (viewer && viewer.update) viewer.update();
      controls.update();
      renderer.render(scene, camera);
    });
  </script>
</body>
</html>
