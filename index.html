<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>3DGS AR Place / Scale / Rotate / Move</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
    }
    #app {
      position: fixed;
      inset: 0;
    }
    #hud {
      position: fixed;
      left: 12px;
      right: 12px;
      top: 12px;
      z-index: 20;
      color: #fff;
      background: rgba(0,0,0,.55);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 14px;
      padding: 12px 14px;
      backdrop-filter: blur(8px);
      line-height: 1.5;
      font-size: 14px;
      box-sizing: border-box;
      pointer-events: none;
    }
    #status {
      font-weight: 700;
      margin-bottom: 6px;
    }
    #detail, #error {
      font-size: 12px;
      opacity: .95;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #error {
      color: #ffb4b4;
      margin-top: 6px;
    }
    #tapHint {
      position: fixed;
      left: 50%;
      bottom: 96px;
      transform: translateX(-50%);
      z-index: 20;
      color: #fff;
      background: rgba(0,0,0,.55);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px;
      padding: 10px 14px;
      backdrop-filter: blur(8px);
      font-size: 13px;
      pointer-events: none;
      display: none;
      white-space: nowrap;
    }
  </style>

  <script async src="https://unpkg.com/es-module-shims@1.10.0/dist/es-module-shims.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/",
      "@mkkellogg/gaussian-splats-3d": "https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/+esm"
    }
  }
  </script>
</head>
<body>
  <div id="app"></div>

  <div id="hud">
    <div id="status">初期化中...</div>
    <div id="detail">3DGS を読み込み中です。</div>
    <div id="error"></div>
  </div>

  <div id="tapHint">床や机を映して平面検知 → 1本指タップで配置</div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { ARButton } from 'three/addons/webxr/ARButton.js';
    import * as GaussianSplats3D from '@mkkellogg/gaussian-splats-3d';

    const app = document.getElementById('app');
    const statusEl = document.getElementById('status');
    const detailEl = document.getElementById('detail');
    const errorEl = document.getElementById('error');
    const tapHintEl = document.getElementById('tapHint');

    function setStatus(s) {
      statusEl.textContent = s;
      console.log('[status]', s);
    }

    function setDetail(s) {
      detailEl.textContent = s;
      console.log('[detail]', s);
    }

    function setError(e) {
      const msg = typeof e === 'string' ? e : (e?.stack || e?.message || String(e));
      errorEl.textContent = msg;
      console.error(e);
    }

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    renderer.xr.setReferenceSpaceType('local');
    app.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x101014);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.position.set(0, 1.2, 3.0);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0.6, 0);
    controls.update();

    const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
    scene.add(hemi);

    const dir = new THREE.DirectionalLight(0xffffff, 1.0);
    dir.position.set(3, 4, 2);
    scene.add(dir);

    const grid = new THREE.GridHelper(4, 20, 0x888888, 0x444444);
    scene.add(grid);

    const axes = new THREE.AxesHelper(0.8);
    scene.add(axes);

    const cube = new THREE.Mesh(
      new THREE.BoxGeometry(0.25, 0.25, 0.25),
      new THREE.MeshStandardMaterial({ color: 0xff4444 })
    );
    cube.position.set(0, 0.125, 0);
    scene.add(cube);

    // 配置対象の親
    const modelAnchor = new THREE.Group();
    modelAnchor.visible = false;
    scene.add(modelAnchor);

    // 3DGS本体
    const splatRoot = new THREE.Group();
    modelAnchor.add(splatRoot);

    const viewer = new GaussianSplats3D.DropInViewer({
      selfDrivenMode: false,
      useBuiltInControls: false,
      gpuAcceleratedSort: false,
      sharedMemoryForWorkers: false,
      enableSIMDInSort: false,
      integerBasedSort: false,
      ignoreDevicePixelRatio: true,
      sceneRevealMode: GaussianSplats3D.SceneRevealMode.Instant,
      renderMode: GaussianSplats3D.RenderMode.Always,
      dynamicScene: false,
      antialiased: false,
      logLevel: GaussianSplats3D.LogLevel.Info,
      sphericalHarmonicsDegree: 0
    });
    splatRoot.add(viewer);

    let modelLoaded = false;
    let modelPlaced = false;

    // モデルの基準向き
    // 通常表示で合っていた前後補正
    const BASE_YAW_OFFSET = Math.PI;

    function getNormalViewYaw() {
      return BASE_YAW_OFFSET;
    }

    function getPlacementYawFacingCamera(targetPos) {
      const xrCam = renderer.xr.isPresenting ? renderer.xr.getCamera(camera) : camera;
      const camPos = new THREE.Vector3();
      xrCam.getWorldPosition(camPos);

      const dx = camPos.x - targetPos.x;
      const dz = camPos.z - targetPos.z;

      // モデルの+Z/-Zの向き差は BASE_YAW_OFFSET で吸収
      return Math.atan2(dx, dz) + BASE_YAW_OFFSET;
    }

    async function testFetch() {
      setDetail('ARtest.ply の存在確認中...');
      const r = await fetch('./ARtest.ply', { method: 'HEAD' });
      if (!r.ok) throw new Error('ARtest.ply fetch failed: HTTP ' + r.status);
      setDetail('ARtest.ply は取得可能です。3DGS を読み込みます...');
    }

    async function loadSplat() {
      await testFetch();

      const start = performance.now();

      await viewer.addSplatScenes([
        {
          path: './ARtest.ply',
          format: GaussianSplats3D.SceneFormat.Ply,
          splatAlphaRemovalThreshold: 1,
          position: [0, 0, 0],
          rotation: [1, 0, 0, 0],
          scale: [1, 1, 1]
        }
      ]);

      const sec = ((performance.now() - start) / 1000).toFixed(1);
      modelLoaded = true;
      setStatus('3DGS 読み込み完了');
      setDetail('読込時間: ' + sec + ' 秒\n通常表示OK。START AR を押してください。');
    }

    // ===== 通常表示用の仮配置 =====
    modelAnchor.visible = true;
    modelAnchor.position.set(0, 0, 0);
    modelAnchor.rotation.set(0, getNormalViewYaw(), 0);
    modelAnchor.scale.setScalar(1.0);

    // ===== AR / hit-test =====
    let xrSession = null;
    let xrRefSpace = null;
    let viewerRefSpace = null;
    let hitTestSource = null;
    let hitTestSourceRequested = false;

    const hitMatrix = new THREE.Matrix4();
    const hitPosition = new THREE.Vector3();

    const reticle = new THREE.Mesh(
      new THREE.RingGeometry(0.08, 0.11, 32).rotateX(-Math.PI / 2),
      new THREE.MeshBasicMaterial({ color: 0x00ff88 })
    );
    reticle.matrixAutoUpdate = false;
    reticle.visible = false;
    scene.add(reticle);

    const floorPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const screenRaycaster = new THREE.Raycaster();

    const arButton = ARButton.createButton(renderer, {
      requiredFeatures: ['hit-test'],
      optionalFeatures: ['dom-overlay'],
      domOverlay: { root: document.body }
    });

    Object.assign(arButton.style, {
      bottom: '20px',
      right: '20px',
      left: 'auto',
      width: 'auto',
      padding: '12px 16px',
      borderRadius: '999px',
      border: '1px solid rgba(255,255,255,.3)',
      background: 'rgba(0,0,0,.6)',
      color: '#fff',
      fontWeight: '700'
    });

    document.body.appendChild(arButton);

    function resetHitTest() {
      if (hitTestSource) {
        hitTestSource.cancel();
        hitTestSource = null;
      }
      hitTestSourceRequested = false;
      xrRefSpace = null;
      viewerRefSpace = null;
    }

    renderer.xr.addEventListener('sessionstart', async () => {
      xrSession = renderer.xr.getSession();
      controls.enabled = false;
      scene.background = null;
      grid.visible = false;
      axes.visible = false;
      cube.visible = false;
      reticle.visible = false;
      tapHintEl.style.display = 'block';

      setStatus('AR開始');
      setDetail('平面検知中です。床や机を映し、表示したい場所を1本指でタップしてください。');

      modelPlaced = false;
      modelAnchor.visible = false;

      xrSession.addEventListener('end', () => {
        xrSession = null;
        resetHitTest();
      });
    });

    renderer.xr.addEventListener('sessionend', () => {
      controls.enabled = true;
      scene.background = new THREE.Color(0x101014);
      grid.visible = true;
      axes.visible = true;
      cube.visible = true;
      reticle.visible = false;
      tapHintEl.style.display = 'none';

      setStatus(modelLoaded ? '3DGS 読み込み完了' : '待機中');
      setDetail(modelLoaded
        ? '通常表示に戻りました。START AR で再開できます。'
        : '3DGS を読み込み中です。');

      modelAnchor.visible = true;
      modelAnchor.position.set(0, 0, 0);
      modelAnchor.rotation.set(0, getNormalViewYaw(), 0);
      modelAnchor.scale.setScalar(1.0);
    });

    async function ensureHitTestSource() {
      if (!xrSession || hitTestSourceRequested) return;
      hitTestSourceRequested = true;

      viewerRefSpace = await xrSession.requestReferenceSpace('viewer');
      xrRefSpace = await xrSession.requestReferenceSpace('local');
      hitTestSource = await xrSession.requestHitTestSource({ space: viewerRefSpace });
    }

    // ===== 2本指ジェスチャ =====
    const activePointers = new Map();

    const gestureState = {
      active: false,
      startDistance: 0,
      startAngle: 0,
      startScale: 1,
      startYaw: 0,
      startPos: new THREE.Vector3(),
      startHitPoint: new THREE.Vector3(),
      currentGroundY: 0
    };

    function getTwoPointers() {
      const arr = [...activePointers.values()];
      if (arr.length < 2) return null;
      return [arr[0], arr[1]];
    }

    function pointerDistance(a, b) {
      return Math.hypot(b.x - a.x, b.y - a.y);
    }

    function pointerAngle(a, b) {
      return Math.atan2(b.y - a.y, b.x - a.x);
    }

    function pointerMid(a, b) {
      return {
        x: (a.x + b.x) * 0.5,
        y: (a.y + b.y) * 0.5
      };
    }

    function screenToNDC(x, y) {
      return new THREE.Vector2(
        (x / window.innerWidth) * 2 - 1,
        -(y / window.innerHeight) * 2 + 1
      );
    }

    function intersectGroundFromScreen(ndc, groundY, outVec3) {
      const xrCam = renderer.xr.isPresenting ? renderer.xr.getCamera(camera) : camera;
      screenRaycaster.setFromCamera(ndc, xrCam);
      floorPlane.constant = -groundY;
      return screenRaycaster.ray.intersectPlane(floorPlane, outVec3);
    }

    function beginGestureIfNeeded() {
      if (!renderer.xr.isPresenting || !modelPlaced) return;

      const pair = getTwoPointers();
      if (!pair) {
        gestureState.active = false;
        return;
      }

      const [p1, p2] = pair;
      const mid = pointerMid(p1, p2);
      const midNdc = screenToNDC(mid.x, mid.y);

      gestureState.active = true;
      gestureState.startDistance = pointerDistance(p1, p2);
      gestureState.startAngle = pointerAngle(p1, p2);
      gestureState.startScale = modelAnchor.scale.x;
      gestureState.startYaw = modelAnchor.rotation.y;
      gestureState.startPos.copy(modelAnchor.position);
      gestureState.currentGroundY = modelAnchor.position.y;

      const hit = intersectGroundFromScreen(midNdc, gestureState.currentGroundY, gestureState.startHitPoint);
      if (!hit) {
        gestureState.startHitPoint.copy(modelAnchor.position);
      }
    }

    function updateGesture() {
      if (!gestureState.active || !renderer.xr.isPresenting || !modelPlaced) return;

      const pair = getTwoPointers();
      if (!pair) return;

      const [p1, p2] = pair;

      // スケール
      const currentDistance = pointerDistance(p1, p2);
      const scaleFactor = currentDistance / Math.max(gestureState.startDistance, 1);
      const newScale = THREE.MathUtils.clamp(gestureState.startScale * scaleFactor, 0.05, 10.0);
      modelAnchor.scale.setScalar(newScale);

      // Y回転
      const currentAngle = pointerAngle(p1, p2);
      const deltaAngle = currentAngle - gestureState.startAngle;
      modelAnchor.rotation.y = gestureState.startYaw + deltaAngle;

      // 2本指中心の移動で平面上をスライド
      const mid = pointerMid(p1, p2);
      const midNdc = screenToNDC(mid.x, mid.y);
      const currentHit = new THREE.Vector3();
      const hit = intersectGroundFromScreen(midNdc, gestureState.currentGroundY, currentHit);

      if (hit) {
        const delta = new THREE.Vector3().subVectors(currentHit, gestureState.startHitPoint);
        modelAnchor.position.copy(gestureState.startPos).sub(delta);
      }
    }

    renderer.domElement.addEventListener('pointerdown', (e) => {
      if (!renderer.xr.isPresenting) return;
      activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (activePointers.size === 2) beginGestureIfNeeded();
    }, { passive: true });

    renderer.domElement.addEventListener('pointermove', (e) => {
      if (!renderer.xr.isPresenting) return;
      if (activePointers.has(e.pointerId)) {
        activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
      }
      if (activePointers.size >= 2) updateGesture();
    }, { passive: true });

    function endPointer(e) {
      activePointers.delete(e.pointerId);
      if (activePointers.size < 2) {
        gestureState.active = false;
      }
    }

    renderer.domElement.addEventListener('pointerup', endPointer, { passive: true });
    renderer.domElement.addEventListener('pointercancel', endPointer, { passive: true });
    renderer.domElement.addEventListener('pointerleave', endPointer, { passive: true });

    // 1本指タップで配置
    renderer.domElement.addEventListener('click', () => {
      if (!renderer.xr.isPresenting) return;
      if (!modelLoaded) return;
      if (!reticle.visible) return;
      if (activePointers.size > 1) return;

      reticle.matrix.decompose(hitPosition, new THREE.Quaternion(), new THREE.Vector3());

      modelAnchor.visible = true;
      modelPlaced = true;
      modelAnchor.position.copy(hitPosition);
      modelAnchor.rotation.set(0, getPlacementYawFacingCamera(hitPosition), 0);

      if (modelAnchor.scale.x === 1.0) {
        modelAnchor.scale.setScalar(0.35);
      }

      setStatus('AR配置済み');
      setDetail('配置しました。\n2本指ピンチ: 拡縮\n2本指ひねり: Y回転\n2本指ドラッグ: 移動');
    });

    loadSplat().catch((err) => {
      setStatus('3DGS 読み込み失敗');
      setError(err);
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    renderer.setAnimationLoop(async (time, frame) => {
      if (!renderer.xr.isPresenting) {
        cube.rotation.y += 0.01;
        controls.update();
      } else {
        await ensureHitTestSource();

        if (frame && hitTestSource && xrRefSpace) {
          const hitTestResults = frame.getHitTestResults(hitTestSource);

          if (hitTestResults.length > 0) {
            const hit = hitTestResults[0];
            const pose = hit.getPose(xrRefSpace);

            if (pose) {
              hitMatrix.fromArray(pose.transform.matrix);
              reticle.visible = true;
              reticle.matrix.fromArray(pose.transform.matrix);
            }
          } else {
            reticle.visible = false;
          }
        }
      }

      if (viewer && viewer.update) viewer.update();
      renderer.render(scene, camera);
    });
  </script>
</body>
</html>
